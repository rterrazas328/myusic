services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - app_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      
    environment:
      # Laravel environment variables
      APP_ENV: local
      APP_DEBUG: true
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      APP_MAINTENANCE_DRIVER: file
      PHP_CLI_SERVER_WORKERS: 4
      BCRYPT_ROUNDS: 12
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_DEPRECATIONS_CHANNEL: null
      LOG_LEVEL: error
      MAIL_MAILER: smtp
      MAIL_SCHEME: null
      MAIL_ENCRYPTION: tls
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: false
      SESSION_PATH: /
      SESSION_DOMAIN: null
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MEMCACHED_HOST: 127.0.0.1
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: file
    secrets:
      - app_key
      - app_name
      - email_domain
      - email_host
      - email_port
      - email_from_address
      - email_from_name
      - email_key
      - email_username
      - email_password
      - db_connection
      - db_port
      - db_database
      - db_username
      - db_password
      - db_root_password
      - vite_app_name
  db:
    image: mysql:8.0.44
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE_FILE: /run/secrets/db_database
      MYSQL_USER_FILE: /run/secrets/db_username
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root --password=$(cat /run/secrets/db_root_password) > /dev/null || exit 1"
        ]
      interval: 05s
      timeout: 10s
      start_period: 30s

    secrets:
      - db_database
      - db_username
      - db_password
      - db_root_password
  redis:
    image: redis:3.0
    ports:
      - "6379:6379"

secrets:
  app_key:
    file: secrets/app_key.txt
  app_name:
    file: secrets/app_name.txt
  email_domain:
    file: secrets/email_domain.txt
  email_host:
    file: secrets/email_host.txt
  email_port:
    file: secrets/email_port.txt
  email_from_address:
    file: secrets/email_from_address.txt
  email_from_name:
    file: secrets/email_from_name.txt
  email_username:
    file: secrets/email_username.txt
  email_key:
    file: secrets/email_key.txt
  email_password:
    file: secrets/email_password.txt
  db_connection:
    file: secrets/db_connection.txt
  db_port:
    file: secrets/db_port.txt
  db_database:
    file: secrets/db_database.txt
  db_username:
    file: secrets/db_username.txt
  db_password:
    file: secrets/db_password.txt
  db_root_password:
    file: secrets/db_root_password.txt
  vite_app_name:
    file: secrets/vite_app_name.txt

volumes:
  app_data:
  db_data:
